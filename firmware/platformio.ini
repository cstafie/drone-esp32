[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_flags =
  --before=default_reset
  --after=soft_reset
  --chip=esp32s3

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  adafruit/Adafruit NeoPixel @ ^1.12.3
  espressif/esp32-camera @ ^2.0.0

build_flags =
  -D ARDUINO_USB_MODE=1        
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D CORE_DEBUG_LEVEL=1
  ; Optional compile-time overrides from shell environment variables:
  ; -D WIFI_SSID_VALUE='"${sysenv.WIFI_SSID}"'
  ; -D WIFI_PASSWORD_VALUE='"${sysenv.WIFI_PASSWORD}"'
  ; -D AP_SSID_VALUE='"${sysenv.AP_SSID}"'
  ; -D AP_PASSWORD_VALUE='"${sysenv.AP_PASSWORD}"'
  ; -D LIGHT_PIN_VALUE=${sysenv.LIGHT_PIN}
